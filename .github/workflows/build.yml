name: build
on:
  push:
    branches: [main]
permissions:
  contents: read
  packages: write
jobs:
  test-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e '.[dev]' && pytest -v
      # The AKS cluster nodes are arm64; build multi-arch so the image runs there.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/ianlintner/openclaw-github-hooks:latest
            ghcr.io/ianlintner/openclaw-github-hooks:${{ github.sha }}
